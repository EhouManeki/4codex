<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350"><rect width="100%" height="100%" fill="#0b1020"/><rect x="60" y="60" width="960" height="1230" rx="40" fill="none" stroke="#5eead4" stroke-width="4"/><text x="100" y="140" fill="#5eead4" font-size="36" font-family="sans-serif">Webデザイナー歴15年で気づいた</text><text x="100" y="230" fill="#f8fafc" font-size="72" font-weight="700" font-family="sans-serif">CVRが上がるLPの共通点 7つ</text><text x="120" y="420" fill="#cbd5e1" font-size="46" font-family="sans-serif">01. ① ファーストビューに「数字」を入れる</text><text x="120" y="530" fill="#cbd5e1" font-size="46" font-family="sans-serif">02. ② CTAボタンは「動詞」で始める</text><text x="120" y="640" fill="#cbd5e1" font-size="46" font-family="sans-serif">03. ③ スマホ表示を先に設計する</text><text x="120" y="750" fill="#cbd5e1" font-size="46" font-family="sans-serif">04. ④ フォームの項目は最小限（3つ以下）</text><text x="120" y="860" fill="#cbd5e1" font-size="46" font-family="sans-serif">05. ⑤ お客様の声は「変化前→変化後」で書く</text><text x="120" y="970" fill="#cbd5e1" font-size="46" font-family="sans-serif">06. ⑥ 価格の前に「価値」を伝える</text><text x="120" y="1080" fill="#cbd5e1" font-size="46" font-family="sans-serif">07. ⑦ 「読まれる」より「見られる」前提で設計</text><rect x="100" y="1160" width="880" height="90" rx="28" fill="#5eead4"/><text x="150" y="1218" fill="#06202a" font-size="42" font-family="sans-serif">保存して実務で使ってください</text></svg>